<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yatin Sharma — Designer & Developer crafting thoughtful digital experiences." />
    <meta property="og:title" content="Yatin Sharma Portfolio" />
    <meta property="og:description" content="Designer & Developer crafting thoughtful digital experiences." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#FFFFFF" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3EYS%3C/text%3E%3C/svg%3E" />
    <title>Yatin Sharma — Designer & Developer</title>

    <!-- Inline, dependency-free so it paints the instant the HTML arrives —
         before the app bundle (which includes the WebGL hero) has downloaded,
         parsed, or run. Removed by src/main.tsx once React has mounted and
         painted the real page. -->
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 0.35s ease;
      }
      #initial-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #initial-loader .dots {
        display: flex;
        gap: 10px;
      }
      #initial-loader .dot {
        width: 11px;
        height: 11px;
        border-radius: 9999px;
        animation: initial-loader-bounce 1.1s ease-in-out infinite;
      }
      #initial-loader .dot:nth-child(1) { background: #4A90E2; animation-delay: 0s; }
      #initial-loader .dot:nth-child(2) { background: #FF6B6B; animation-delay: 0.12s; }
      #initial-loader .dot:nth-child(3) { background: #FFD93D; animation-delay: 0.24s; }
      #initial-loader .dot:nth-child(4) { background: #6BCB77; animation-delay: 0.36s; }
      @keyframes initial-loader-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
        40% { transform: translateY(-10px); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #initial-loader .dot { animation: none; opacity: 0.85; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="initial-loader" role="status" aria-label="Loading">
      <div class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
